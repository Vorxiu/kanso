name: build-iso
on:
  workflow_dispatch:
  schedule:
    - cron: "00 08 1 * *" # build at 08:00 UTC on the first day of every month
env:
  IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build-iso:
    name: Build ISO
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read

    steps:
      - name: Maximize build space
        uses: ublue-os/remove-unwanted-software@v9

      - name: Install bluebuild cli
        run: bash <(curl -s https://raw.githubusercontent.com/blue-build/cli/main/install.sh)
      - name: set release date
        run: |
          echo "RELEASE_DATE=$(date --rfc-3339=date)" >> ${GITHUB_ENV}
      - name: Generate ISO
        run: |
          sudo bluebuild generate-iso --iso-name kanso-latest-${{ env.RELEASE_DATE }}.iso image ghcr.io/vorxiu/kanso:latest

      - name: Upload ISO as artifact
        uses: actions/upload-artifact@v7
        with:
          name: kanso-latest-${{ env.RELEASE_DATE }}-iso
          path: ./*.iso
          if-no-files-found: error
          retention-days: 60
          archive: false
          compression-level: 9

      - name: Upload checksum as artifact
        uses: actions/upload-artifact@v7
        with:
          name: kanso-latest-${{ env.RELEASE_DATE }}-checksum
          path: ./*-CHECKSUM
          if-no-files-found: error
          retention-days: 60
          archive: false

      - name: Upload to SourceForge
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/sf_key
          chmod 600 ~/.ssh/sf_key
          ssh-keyscan frs.sourceforge.net >> ~/.ssh/known_hosts
          rsync -avz -e "ssh -i ~/.ssh/sf_key" \
            ./*.iso \
            ./*-CHECKSUM \
            vorxiu,kanso@frs.sourceforge.net:/home/frs/project/kanso/
