name: build-iso
on:
  workflow_dispatch: 

env:
  IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build-iso:
    name: Build ISO
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read

    steps:
      - name: Maximize build space
        uses: ublue-os/remove-unwanted-software@v9

      - name: Install bluebuild cli
        run: bash <(curl -s https://raw.githubusercontent.com/blue-build/cli/main/install.sh)

      - name: Generate ISO
        run: |
          sudo bluebuild generate-iso --iso-name ${{ github.event.repository.name }}-latest.iso image ghcr.io/vorxiu/ublue-niri:latest

      - name: Upload ISO as artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ github.event.repository.name }}-latest-iso
          path: ./*.iso
          if-no-files-found: error
          compression-level: 0
          retention-days: 30
          archive: false 

      - name: Upload checksum as artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ github.event.repository.name }}-latest-checksum
          path: ./*-CHECKSUM
          if-no-files-found: error
          compression-level: 0
          retention-days: 30
          archive: false 
