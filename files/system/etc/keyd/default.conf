[ids]

*

[main]

# Hold Left Meta to use it as a normal Meta modifier; tap it to send Left Meta+O.
leftmeta = overload(meta, macro(leftmeta+O))

# Hold Right Alt or Right Ctrl to use H/J/K/L as arrow keys in any app.
rightalt = layer(nav)
rightcontrol = layer(nav)

[nav]
h = left
j = down
k = up
l = right
